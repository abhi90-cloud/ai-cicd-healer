name: CI Pipeline
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          pip install fastapi uvicorn pydantic python-multipart sqlalchemy redis pytest pytest-cov requests httpx python-dotenv click tqdm joblib scikit-learn xgboost lightgbm pandas numpy matplotlib seaborn plotly streamlit prometheus-client python-json-logger starlette
      - name: Run tests
        run: pytest tests/ -v
